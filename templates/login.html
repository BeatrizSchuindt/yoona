{% load static %}
<!DOCTYPE HTML>
<html lang="pt-br">
<head>
    <title>Acesso Restrito | Yoona Head Spa</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    
    <!-- Link para o seu CSS principal do template Dimension -->
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}" />
    <noscript><link rel="stylesheet" href="{% static 'assets/css/noscript.css' %}" /></noscript>

    <!-- Estilo específico (sobrescrito) para a tela de login unificado -->
    <style>
        body.login-page {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1b1f22; /* Cor de fundo escura combinando com o template */
            font-family: "Source Sans Pro", Helvetica, sans-serif;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Lado esquerdo: Imagem do Spa */
        .login-image-side {
            flex: 1;
            display: none; /* Esconde em telas pequenas */
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .login-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7; /* Escurece um pouco a imagem para ficar elegante */
        }

        /* Lado direito: Formulário */
        .login-form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            background: #1b1f22;
            color: #ffffff;
        }

        .login-form-container {
            width: 100%;
            max-width: 400px; /* Mantém o formulário num tamanho agradável */
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-size: 2rem;
            letter-spacing: 0.2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .login-header p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
        }

        /* Ajustes dos campos de formulário para herdar do template base */
        .login-form-container .fields {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .login-form-container input[type="text"],
        .login-form-container input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: solid 1px rgba(255, 255, 255, 0.15);
            color: inherit;
            border-radius: 4px;
        }

        .login-form-container input[type="text"]:focus,
        .login-form-container input[type="password"]:focus {
            border-color: #ffffff;
            outline: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-options a {
            color: rgba(255, 255, 255, 0.5);
            border-bottom: 1px dotted rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }

        .form-options a:hover {
            color: #ffffff;
            border-bottom-color: transparent;
        }

        .btn-login {
            width: 100%;
            text-align: center;
        }

        /* Responsividade */
        @media screen and (min-width: 736px) {
            .login-image-side {
                display: block; /* Mostra a imagem em telas maiores que mobile */
            }
        }
    </style>
</head>
<body class="is-preload login-page">

    <div class="login-wrapper">
        
        <!-- Lado da Imagem (Oculto no celular, visível no Desktop) -->
        <div class="login-image-side">
            <img src="{% static 'images/login-bg.jpg' %}" alt="[Imagem vertical e relaxante mostrando um detalhe do ambiente interno do Yoona Head Spa, como a sala de terapias ou produtos essenciais]" />
        </div>

        <!-- Lado do Formulário -->
        <div class="login-form-side">
            <div class="login-form-container">
                
                <div class="login-header">
                    <span class="icon fa-gem" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></span>
                    <h2>Yoona Spa</h2>
                    <p>Acesso da Equipe</p>
                </div>

                <!-- Formulário de Login do Django -->
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="fields">
                        <div class="field">
                            <label for="username">Usuário / E-mail</label>
                            <input type="text" name="username" id="username" placeholder="Digite seu usuário" required autofocus />
                        </div>
                        
                        <div class="field">
                            <label for="password">Senha</label>
                            <input type="password" name="password" id="password" placeholder="Digite sua senha" required />
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="field">
                            <input type="checkbox" id="remember_me" name="remember_me">
                            <label for="remember_me">Lembrar-me</label>
                        </div>
                        <a href="{% url 'password_reset' %}">Esqueceu a senha?</a>
                    </div>
                    
                    <ul class="actions">
                        <li style="width: 100%;">
                            <input type="submit" value="Entrar no Sistema" class="primary btn-login" />
                        </li>
                    </ul>
                    
                    <!-- Mensagens de erro do Django (credenciais inválidas, etc) -->
                    {% if form.errors %}
                        <p style="color: #ff6b6b; font-size: 0.85rem; text-align: center; margin-top: 1rem;">
                            Usuário ou senha incorretos. Tente novamente.
                        </p>
                    {% endif %}

                </form>

                <p style="text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: 3rem;">
                    &copy; Yoona Head Spa. Desenvolvido por Ana Beatriz Schuindt.
                </p>

            </div>
        </div>

    </div>

    <!-- Scripts necessários do template -->
    <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'assets/js/browser.min.js' %}"></script>
    <script src="{% static 'assets/js/breakpoints.min.js' %}"></script>
    <script src="{% static 'assets/js/util.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>

</body>
</html>
